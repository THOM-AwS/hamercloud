eek, he felt that this was the ideal place to commence lucerne farming. He returned to Perth, broke in a team of horses and transported his wife, Mary Reynolds, by sulky and his furniture by trolley to Canowindra. He had met Ma","tree":[]},{"pointer":"","tag":"CONC","data":"ry when she worked as a domestic servant for his Uncle Tom Cheney [WC2] at &amp;quot;Cheston&amp;quot;, just across the Vale Creek from the Hamer property. George commenced share farming with George Grant, the first farmer to grow lucerne commercia","tree":[]},{"pointer":"","tag":"CONC","data":"lly at Canowindra, using a horse-operated press and hay baling Mudgee style. He carried his hay bales by horse-drawn trolley fourteen miles to the railhead at Woodstock. He also from time to time did share farming with other members of the Grant fa","tree":[]},{"pointer":"","tag":"CONC","data":"mily - Tom, Alla and Joe, as well as George Grant. His ploughing was done at first with bullocks and later horses, and later again with a tractor. He purchased a farm on the Woodstock Road but immediately was confronted with a long drought and als","tree":[]},{"pointer":"","tag":"CONC","data":"o had his home accidentally burnt down. This set him back financially and he was forced to sell the property. He returned to share farming with the Grants and later bought another property at Moorbel and built a new home; and a further property sev","tree":[]},{"pointer":"","tag":"CONC","data":"en miles from Eugowra on the Parkes Road, where he grew wheat. He struck a period of depressed wheat prices and was forced to return to lucerne farming. He and Mary moved to live in Canowwindra itself in the 1930s. His son Bill [Lloyd George Hame","tree":[]},{"pointer":"","tag":"CONC","data":"r - AH456] bought a property named &amp;quot;Bon Accord&amp;quot; in partnership with his father in 1940. George and Mary&amp;#39;s eldest son Dudley [AH451] died at the age of fifteen and their second son Aubrey [AH453], who worked on the Railway","tree":[]},{"pointer":"","tag":"CONC","data":"s at Canowindra and Blayney and was an outstanding cricketer, was killed when thrown from a horse at the age of 21. Their fifth child Jack [Raymond Noel - AH455] was a dairy farmer before joining the police force where he rose to the rank of Superi","tree":[]},{"pointer":"","tag":"CONC","data":"ntendent in Sydney. Jack&amp;#39;s three sons and his daughter all trained as lawyers and run a legal business in Sydney. Brian Hamer [AH4553] holds the degrees of Bachelor of Arts and Master of Laws from the University of Sydney and practises a","tree":[]},{"pointer":"","tag":"CONC","data":"s a lawyer in Sydney. He was elected to the Manly Municipal Council in 1991 and was elected Mayor of Manly in 1994, the last Mayor to be elected by the Council. From 1995, the Mayor is to be elected by direct vote of the people. Brian&amp;#39;s chi","tree":[]},{"pointer":"","tag":"CONC","data":"ldren Sadie [AH45531] is studying Arts/Law at Sydney University, Murray [AH45532] has completed an Arts degree, and Cassandra (Cassie) [AH45533], after doing an Arts degree in Communications at the Charles Sturt University at Bathurst worked as a t","tree":[]},{"pointer":"","tag":"CONC","data":"elevision journalist at Newcastle, where she became Chief of Staff and won the Award as the Best TV Journalist in 2000, as well as Awards for her series on the closure of the BHP steelworks at Newcastle. &lt;p&gt;&amp;nbsp;&lt;/p&gt;&lt;p&gt;&amp;n","tree":[]},{"pointer":"","tag":"CONC","data":"bsp;&lt;/p&gt;George and Mary&amp;#39;s eldest daughter Nena Hamer [AH452], a nursing sister, and their second daughter Lorna Hamer [AH454] married a real estate businessman and a banker respectively. George Hamer and his youngest son Bill were int","tree":[]},{"pointer":"","tag":"CONC","data":"erested in horses and trained and groomed a number of trotters that raced in the western districts of New South Wales. Bill&amp;#39;s son Graeme [AH4561] is a technical officer with the Central Western (Electricity) County Council; and his second s","tree":[]},{"pointer":"","tag":"CONC","data":"on Peter [AH4562] is a Sergeant of Police. &lt;p&gt;&amp;nbsp;&lt;/p&gt;</line></content></metadataxml>","tree":[]}]},{"pointer":"","tag":"_CREA","data":"2026-03-22 03:10:00.897","tree":[]},{"pointer":"","tag":"_USER","data":"gsnrk+oXH7M5LSYEperCvH2NLXXMtRtyhlxX4m8zH2w7Dh4wW2dzpmGYeq/pDRJno22aB6ZN8c1NaQ1JNwfooA==","tree":[{"pointer":"","tag":"_ENCR","data":"1","tree":[]}]},{"pointer":"","tag":"_CLON","data":"","tree":[{"pointer":"","tag":"_TID","data":"1973961","tree":[]},{"pointer":"","tag":"_PID","data":"1742726327","tree":[]},{"pointer":"","tag":"_OID","data":"39bb6af0-e5c5-4bd6-be77-bd6b896ccbee","tree":[]},{"pointer":"","tag":"_USER","data":"K7Nh693JC69WEccaSMgjg9PTUDaBj5CnQlE39nCw7qNWgTQmR28JneDLuwKeiwfVclhqw4vW8M7k9A4APtIn5g==","tree":[{"pointer":"","tag":"_ENCR","data":"1","tree":[]}]},{"pointer":"","tag":"_DATE","data":"2011-04-03 03:29:34.647","tree":[]}]},{"pointer":"","tag":"_ORIG","data":"u","tree":[]},{"pointer":"","tag":"_MSER","data":"","tree":[{"pointer":"","tag":"_LKID","data":"39bb6af0-e5c5-4bd6-be77-bd6b896ccbee","tree":[]}]},{"pointer":"","tag":"_ATL","data":"N","tree":[]}]},{"pointer":"@O96@","tag":"OBJE","data":"","tree":[{"pointer":"","tag":"FILE","data":"","tree":[{"pointer":"","tag":"FORM","data":"jpg","tree":[{"pointer":"","tag":"TYPE","data":"image","tree":[]},{"pointer":"","tag":"_STYPE","data":"jpeg","tree":[]},{"pointer":"","tag":"_SIZE","data":"392617","tree":[]},{"pointer":"","tag":"_WDTH","data":"1970","tree":[]},{"pointer":"","tag":"_HGHT","data":"911","tree":[]}]},{"pointer":"","tag":"TITL","data":"Entwisle-Isaac-Sarah-Greenhalgh_1787-Feb-20_marriage_page-355","tree":[]}]},{"pointer":"","tag":"_OID","data":"d367e0a7-81b4-468b-afc3-25ddf1515fb5","tree":[]},{"pointer":"","tag":"DATE","data":"20 Feb 1787","tree":[]},{"pointer":"","tag":"PLAC","data":"Bolton, Manchester, England","tree":[]},{"pointer":"","tag":"_DSCR","d
